    <h2>このシミュレーターの使い方と見方</h2>

    <h3>複利とは？</h3>
    <p>
      複利とは「利息にも利息がつく」仕組みです。元本100万円・年利5%の場合、1年目は5万円の利息がつきますが、
      2年目以降は「元本＋利息」に対して利息が計算されるため、雪だるま式に資産が増えていきます。
      運用期間が長いほどその効果は大きくなります。
    </p>

    <h3>元利定額（元利均等）返済とは？</h3>
    <p>
      毎月の返済額（元金＋利息）が一定の返済方式です。返済計画が立てやすく、住宅ローンで最も一般的に使われます。
      ただし、返済初期は利息の割合が多く、元金の減りが遅いという特徴があります。
    </p>

    <h3>元金定額（元金均等）返済とは？</h3>
    <p>
      毎月の元金返済額が一定の返済方式です。残高が早く減るため利息総額を抑えられますが、
      返済初期の負担が大きくなります。返済が進むにつれて毎月の返済額が減っていきます。
    </p>

    <h3>一括払いとローン、どちらが有利？</h3>
    <p>
      運用利率がローン金利を上回る場合、手元の資金を運用し続けるローンの方が最終資産が大きくなる傾向があります。
      例えば運用利率5%・ローン金利1.5%の場合、差額の約3.5%分だけ資産を効率よく増やせる計算になります。
    </p>
    <ul>
      <li>運用利率 ＞ ローン金利：ローンを組む方が最終資産は大きくなりやすい</li>
      <li>運用利率 ＜ ローン金利：一括払いの方が最終資産は大きくなりやすい</li>
    </ul>

    <h3>定年後の資産推移</h3>

      定年前にローンを完済しているかどうかも、老後の資産形成に大きく影響します。
    </p>

<script>
let chart;
let loanType = 'gantei';

function setLoanType(t) {
  loanType = t;
  document.getElementById('btn-gantei').className = t === 'gantei' ? 'active' : '';
  document.getElementById('btn-gankin').className = t === 'gankin' ? 'active' : '';
  document.getElementById('loan-type-desc').textContent =
    t === 'gantei' ? '毎年の返済額が一定（元利均等）' : '毎年の元金返済額が一定（元金均等）・初期負担大・利息少';
  update();
}

function fmt(v) {
  const neg = v < 0;
  v = Math.abs(Math.round(v));
  let s;
  if (v >= 100000000) s = '¥' + (v / 100000000).toFixed(2) + '億';
  else if (v >= 10000) s = '¥' + (v / 10000).toFixed(0) + '万';
  else s = '¥' + v.toLocaleString('ja-JP');
  return neg ? '-' + s : s;
}

function fmtAxis(v) {
  if (v >= 100000000) return (v / 100000000).toFixed(1) + '億';
  if (v >= 10000) return (v / 10000).toFixed(0) + '万';
  return v.toLocaleString('ja-JP');
}

function buildSchedule(loanAmt, annualRate, loanYears, type) {
  const schedule = [];
  let balance = loanAmt;
  const r = annualRate;
  if (type === 'gantei') {
    const payment = r === 0 ? loanAmt / loanYears
      : loanAmt * r * Math.pow(1+r, loanYears) / (Math.pow(1+r, loanYears) - 1);
    for (let i = 0; i < loanYears; i++) {
      const interest = balance * r;
      const princ = payment - interest;
      balance = Math.max(0, balance - princ);
      schedule.push({ payment, interest });
    }
  } else {
    const fixedPrinc = loanAmt / loanYears;
    for (let i = 0; i < loanYears; i++) {
      const interest = balance * r;
      const payment = fixedPrinc + interest;
      balance = Math.max(0, balance - fixedPrinc);
      schedule.push({ payment, interest });
    }
  }
  return schedule;
}

function update() {
  const P = parseInt(document.getElementById('principal').value);
  const A = parseInt(document.getElementById('annual').value);
  const r = parseInt(document.getElementById('rate').value) / 100;
  const Y = parseInt(document.getElementById('years').value);
  const RY = Math.min(parseInt(document.getElementById('retire-year').value), Y);
  const E = parseInt(document.getElementById('expense').value);
  const EY = Math.min(parseInt(document.getElementById('expense-year').value), Y - 1);
  const LR = parseFloat(document.getElementById('loan-rate').value) / 100;
  const LY = Math.min(parseInt(document.getElementById('loan-years').value), Y - EY);

  document.getElementById('principal-label').textContent = fmt(P);
  document.getElementById('annual-label').textContent = fmt(A);
  document.getElementById('rate-label').textContent = (r * 100).toFixed(0) + '%';
  document.getElementById('years-label').textContent = Y + '年';
  document.getElementById('retire-label').textContent = RY + '年目';
  document.getElementById('expense-label').textContent = fmt(E);
  document.getElementById('expense-year-label').textContent = EY + '年目';
  document.getElementById('loan-rate-label').textContent = (LR * 100).toFixed(1) + '%';
  document.getElementById('loan-years-label').textContent = LY + '年';

  const schedule = E > 0 ? buildSchedule(E, LR, LY, loanType) : [];
  const totalLoanPaid = schedule.reduce((s, x) => s + x.payment, 0);
  const totalInterest = schedule.reduce((s, x) => s + x.interest, 0);

  document.getElementById('total-loan-out').textContent = fmt(totalLoanPaid);
  document.getElementById('total-interest-out').textContent = fmt(totalInterest);

  if (schedule.length > 0) {
    const fp = schedule[0].payment, lp = schedule[schedule.length-1].payment;
    document.getElementById('repayment-preview').textContent =
      loanType === 'gantei'
        ? `毎年返済額：${fmt(fp)}（均一）　利息総額：${fmt(totalInterest)}`
        : `初年度：${fmt(fp)}　最終年：${fmt(lp)}　利息総額：${fmt(totalInterest)}`;
  } else {
    document.getElementById('repayment-preview').textContent = '';
  }

  const labels = [], noneData = [], lumpData = [], loanData = [];
  let valNone = P, valLump = P, valLoan = P;

  for (let y = 0; y <= Y; y++) {
    labels.push(y + '年');
    if (y === 0) { valNone = P; valLump = P; valLoan = P; }
    else {
      const addInv = y <= RY ? A : 0;
      valNone = valNone * (1 + r) + addInv;
      valLump = (y === EY && E > 0)
        ? Math.max(0, valLump * (1+r) + addInv - E)
        : valLump * (1+r) + addInv;
      const schedIdx = y - EY - 1;
      const repayment = (E > 0 && schedIdx >= 0 && schedIdx < schedule.length) ? schedule[schedIdx].payment : 0;
      valLoan = Math.max(0, valLoan * (1+r) + addInv - repayment);
    }
    noneData.push(Math.round(valNone));
    lumpData.push(Math.round(valLump));
    loanData.push(Math.round(valLoan));
  }

  document.getElementById('none-out').textContent = fmt(valNone);
  document.getElementById('lump-out').textContent = fmt(valLump);
  document.getElementById('loan-out').textContent = fmt(valLoan);

  const diff = valLoan - valLump;
  const diffEl = document.getElementById('diff-out');
  const diffCard = document.getElementById('diff-card');
  diffEl.textContent = (diff >= 0 ? '+' : '') + fmt(diff);
  diffCard.className = 'card ' + (diff >= 0 ? 'accent' : 'danger');

  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = noneData;
    chart.data.datasets[1].data = lumpData;
    chart.data.datasets[2].data = loanData;
    chart.update();
  } else {
    chart = new Chart(document.getElementById('chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label:'支出なし', data:noneData, borderColor:'#888780', backgroundColor:'transparent', fill:false, tension:0.3, pointRadius:2, borderWidth:1.5, borderDash:[4,3] },
          { label:'一括払い', data:lumpData, borderColor:'#D85A30', backgroundColor:'rgba(216,90,48,0.07)', fill:true, tension:0.3, pointRadius:2, borderWidth:2 },
          { label:'ローン', data:loanData, borderColor:'#1a4fa0', backgroundColor:'rgba(26,79,160,0.07)', fill:true, tension:0.3, pointRadius:2, borderWidth:2 }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend:{display:false},
          tooltip:{ callbacks:{ label: ctx => ctx.dataset.label + ': ' + fmt(ctx.parsed.y) } }
        },
        scales: {
          x:{ ticks:{autoSkip:true, maxTicksLimit:10, font:{size:11}}, grid:{display:false} },
          y:{ ticks:{font:{size:11}, callback:v=>fmtAxis(v)}, grid:{color:'rgba(0,0,0,0.05)'} }
        }
      }
    });
  }
}

// マーカー描画
const markerPlugin = {
  id: 'markers',
  afterDraw(ch) {
    const Y = parseInt(document.getElementById('years').value);
    const EY = Math.min(parseInt(document.getElementById('expense-year').value), Y-1);
    const LY = Math.min(parseInt(document.getElementById('loan-years').value), Y-EY);
    const RY = Math.min(parseInt(document.getElementById('retire-year').value), Y);
    const E = parseInt(document.getElementById('expense').value);
    const meta = ch.getDatasetMeta(0);
    if (!meta.data.length) return;
    const ctx = ch.ctx, top = ch.chartArea.top, bottom = ch.chartArea.bottom;

    function drawLine(idx, color, dash, label) {
      if (idx < 0 || idx > Y || !meta.data[idx]) return;
      const x = meta.data[idx].x;
      ctx.save();
      ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.setLineDash(dash);
      ctx.beginPath(); ctx.moveTo(x,top); ctx.lineTo(x,bottom); ctx.stroke();
      ctx.setLineDash([]); ctx.fillStyle=color;
      ctx.font='10px Noto Sans JP,sans-serif'; ctx.textAlign='center';
      ctx.fillText(label, x, top-3);
      ctx.restore();
    }

    drawLine(RY, '#2d6a1f', [5,3], '定年');
    if (E > 0) {
      drawLine(EY, '#D85A30', [4,3], '購入');
      const endY = Math.min(EY+LY, Y);
      drawLine(endY, '#1a4fa0', [3,3], '完済');
      if (meta.data[EY] && meta.data[endY]) {
        ctx.save(); ctx.fillStyle='rgba(26,79,160,0.05)';
        ctx.fillRect(meta.data[EY].x, top, meta.data[endY].x - meta.data[EY].x, bottom-top);
        ctx.restore();
      }
    }
    if (meta.data[RY] && meta.data[Y]) {
      ctx.save(); ctx.fillStyle='rgba(45,106,31,0.05)';
      ctx.fillRect(meta.data[RY].x, top, meta.data[Y].x - meta.data[RY].x, bottom-top);
      ctx.restore();
    }
  }
};
Chart.register(markerPlugin);
update();
</script>
