<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>バフェットサマリー手動集計</title></head>
<body style="font-family:sans-serif;padding:20px;background:#0c0c14;color:#e8e8f4;">
<h2>バフェット流サマリー - 手動集計</h2>
<p>全100ページ（5銘柄ずつ）を順次処理します。完了まで30〜45分かかります。<br>タブを閉じないでください。J-Quantsのレート制限を考慮して各ページ間に5秒待機します。</p>
<button id="start" onclick="startBatch()" style="padding:10px 20px;background:#4488ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">集計開始</button>
<pre id="log" style="font-size:11px;background:#13131f;padding:12px;border-radius:6px;margin-top:16px;max-height:500px;overflow-y:auto;"></pre>

<script>
const WORKER = 'https://anthropic-proxy.gourmetazuki.workers.dev';
const log = document.getElementById('log');
const TOTAL_PAGES = 100;

function addLog(msg) {
  log.textContent += msg + '\n';
  log.scrollTop = log.scrollHeight;
}

async function startBatch() {
  document.getElementById('start').disabled = true;
  addLog('集計開始 - ' + new Date().toLocaleTimeString('ja-JP'));

  const allGoodStocks = [];
  const seenCodes = new Set();

  for (let page = 0; page < TOTAL_PAGES; page++) {
    try {
      addLog(`[${page+1}/${TOTAL_PAGES}] ページ ${page} 取得中...`);
      const t0 = Date.now();
      const buster = Date.now();
      const res = await fetch(`${WORKER}/screener-buffett?page=${page}&refresh=1&_=${buster}`, {cache:'no-store'});
      const data = await res.json();
      const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

      if (data.error) {
        addLog(`  ✗ エラー: ${data.error}（${elapsed}秒）`);
      } else {
        const stocks = data.stocks || [];
        const total = data.totalStocks || 0;
        const good = stocks.filter(s => s.grade === 'A' || s.grade === 'B');
        good.forEach(s => {
          if (!seenCodes.has(s.code)) {
            seenCodes.add(s.code);
            allGoodStocks.push(s);
          }
        });
        addLog(`  ✓ ${stocks.length}銘柄 / 優良${good.length} / 累計${allGoodStocks.length} / 総数:${total}（${elapsed}秒）`);
      }
    } catch(e) {
      addLog(`  ✗ エラー: ${e.message}`);
    }
    await new Promise(r => setTimeout(r, 5000));
  }

  addLog('');
  addLog(`全ページ完了。累計 ${allGoodStocks.length}銘柄をサーバーに保存中...`);

  try {
    const saveRes = await fetch(`${WORKER}/screener-buffett-save`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({stocks: allGoodStocks}),
    });
    const saveData = await saveRes.json();
    if (saveData.ok) {
      addLog(`✅ 保存完了！${saveData.saved}銘柄が「⭐ 優良銘柄まとめ」タブで見られます。`);
    } else {
      addLog(`✗ 保存エラー: ${JSON.stringify(saveData)}`);
    }
  } catch(e) {
    addLog(`✗ 保存エラー: ${e.message}`);
  }

  addLog('集計処理終了 - ' + new Date().toLocaleTimeString('ja-JP'));
  document.getElementById('start').disabled = false;
}
</script>
</body></html>
