<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>バフェットサマリー手動集計</title></head>
<body style="font-family:sans-serif;padding:20px;background:#0c0c14;color:#e8e8f4;">
<h2>バフェット流サマリー - 手動集計</h2>
<p>全25ページを順次処理します。完了まで15〜20分かかります。タブを閉じないでください。</p>
<button id="start" onclick="startBatch()" style="padding:10px 20px;background:#4488ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">集計開始</button>
<pre id="log" style="font-size:11px;background:#13131f;padding:12px;border-radius:6px;margin-top:16px;max-height:500px;overflow-y:auto;"></pre>

<script>
const WORKER = 'https://anthropic-proxy.gourmetazuki.workers.dev';
const log = document.getElementById('log');

function addLog(msg) {
  log.textContent += msg + '\n';
  log.scrollTop = log.scrollHeight;
}

async function startBatch() {
  document.getElementById('start').disabled = true;
  addLog('集計開始 - ' + new Date().toLocaleTimeString('ja-JP'));

  for (let page = 0; page < 25; page++) {
    try {
      addLog(`[${page+1}/25] ページ ${page} 処理中...`);
      const res = await fetch(`${WORKER}/screener-buffett-batch?page=${page}`);
      const data = await res.json();
      if (data.error) {
        addLog(`  エラー: ${data.error}`);
      } else {
        addLog(`  → 追加:${data.added}銘柄, 累計:${data.totalWip}銘柄, 完了ページ:${data.completedPages}/25`);
        if (data.finalized) {
          addLog('✅ 全25ページ完了！サマリーが本番反映されました。');
          break;
        }
      }
    } catch(e) {
      addLog(`  エラー: ${e.message}`);
    }
    // 2秒待機（レート制限対策）
    await new Promise(r => setTimeout(r, 2000));
  }

  addLog('集計処理終了 - ' + new Date().toLocaleTimeString('ja-JP'));
  document.getElementById('start').disabled = false;
}
</script>
</body></html>
