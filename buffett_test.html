<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body>
<h3>米国版テスト</h3>
<pre id="p" style="font-size:11px;white-space:pre-wrap;">取得中...（60秒程度）</pre>
<script>
fetch('https://anthropic-proxy.gourmetazuki.workers.dev/screener-buffett-us')
  .then(r=>r.json())
  .then(d=>{
    if (d.error) {
      document.getElementById('p').textContent = 'ERROR: ' + d.error;
      return;
    }
    const stocks = d.stocks || [];
    const lines = [];
    lines.push('total: ' + d.total);
    lines.push('取得銘柄数: ' + stocks.length);
    lines.push('updated: ' + d.updated);
    lines.push('');
    lines.push('上位10銘柄:');
    stocks.slice(0,10).forEach(s => {
      lines.push(`${s.code} ${s.name} ${s.grade}(${s.score}/7) PER:${s.per?.toFixed(1)} PBR:${s.pbr?.toFixed(2)} ROE:${s.roe?.toFixed(1)}%`);
    });
    document.getElementById('p').textContent = lines.join('\n');
  })
  .catch(e => document.getElementById('p').textContent = 'ERR: ' + e.message);
</script>
</body></html>
