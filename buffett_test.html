<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body>
<h3>米国版テスト（FMP v5）</h3>
<pre id="p" style="font-size:11px;white-space:pre-wrap;">取得中...</pre>
<script>
fetch(`https://anthropic-proxy.gourmetazuki.workers.dev/screener-buffett-us?_=${Date.now()}`, {cache:'no-store'})
  .then(r=>r.json())
  .then(d=>{
    if (d.error) { document.getElementById('p').textContent = 'ERR: ' + d.error; return; }
    const stocks = d.stocks || [];
    const lines = [];
    lines.push('total: ' + d.total + ' / 取得: ' + stocks.length);
    lines.push('A評価: ' + stocks.filter(s=>s.grade==='A').length);
    lines.push('B評価: ' + stocks.filter(s=>s.grade==='B').length);
    lines.push('');
    lines.push('上位15銘柄:');
    stocks.slice(0,15).forEach(s => {
      lines.push(`${s.code} ${s.name} ${s.grade}(${s.score}/7) PER:${s.per?.toFixed(1)} PBR:${s.pbr?.toFixed(2)} ROE:${s.roe?.toFixed(1)}% 自己資本:${s.eqAR?.toFixed(0)}%`);
    });
    document.getElementById('p').textContent = lines.join('\n');
  });
</script>
</body></html>
