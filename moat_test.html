<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<p id="p1">取得中...</p>
<script>
fetch('https://anthropic-proxy.gourmetazuki.workers.dev/moat')
  .then(r => r.json())
  .then(d => {
    const industries = d.industries || [];
    document.getElementById('p1').textContent =
      '件数: ' + industries.length +
      ' / error: ' + (d.error || 'none') +
      ' / 最初の業界: ' + (industries[0]?.name || 'なし') +
      ' / scope例: ' + (industries[0]?.scope || 'なし');
  })
  .catch(e => { document.getElementById('p1').textContent = 'エラー: ' + e.message; });
</script>
</body>
</html>
